<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <title>Kalai's AI Hub</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 20px;
            border: 2px solid #3b82f6;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        h1 {
            color: #60a5fa;
        }

        .status {
            color: #4ade80;
            font-weight: bold;
            margin-top: 10px;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Kalai's Automation Hub</h1>
        <p>Namma Laptop-la n8n ippo live-a irukku!</p>
        <div class="status">● System Online</div>
        <button onclick="window.location.href='http://localhost:5678'">Open n8n Dashboard</button>
    </div>
</body>

</html>
